name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ──────────────────────────────────────────────
    # 1. Kotlin Lint (ktlint)
    # ──────────────────────────────────────────────
    ktlint:
        name: 🔍 Ktlint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                  restore-keys: ${{ runner.os }}-gradle-

            - name: Run ktlint
              run: ./gradlew ktlintCheck

    # ──────────────────────────────────────────────
    # 2. Swift Lint
    # ──────────────────────────────────────────────
    swiftlint:
        name: 🔍 SwiftLint
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install SwiftLint
              run: brew install swiftlint

            - name: Run SwiftLint
              run: swiftlint lint --config .swiftlint.yml --strict

    # ──────────────────────────────────────────────
    # 3. Unit Tests (shared module — commonTest)
    # ──────────────────────────────────────────────
    unit-tests:
        name: 🧪 Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                  restore-keys: ${{ runner.os }}-gradle-

            - name: Run unit tests
              run: ./gradlew :shared:testDebugUnitTest

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: shared/build/reports/tests/

    # ──────────────────────────────────────────────
    # 4. Android Build
    # ──────────────────────────────────────────────
    build-android:
        name: 🔨 Build Android
        runs-on: ubuntu-latest
        needs: [ktlint, unit-tests]
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                  restore-keys: ${{ runner.os }}-gradle-

            - name: Build debug APK
              run: ./gradlew :composeApp:assembleDebug
