# SwiftLint configuration
# https://realm.github.io/SwiftLint/rule-directory.html

included:
  - iosApp

excluded:
  - iosApp/iosApp.xcodeproj
  - iosApp/build
  - iosApp/Pods

# Rules
disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional
  - sorted_imports
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - unowned_variable_capture

# Customizations
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 40
  error: 80

function_parameter_count:
  warning: 6
  error: 10

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - i
    - op

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

reporter: "xcode"
